[package]
name         = "garudust"
version      = { workspace = true }
edition      = { workspace = true }
authors      = { workspace = true }
license      = { workspace = true }
repository   = { workspace = true }
homepage     = { workspace = true }
rust-version = { workspace = true }
description  = "Garudust AI agent — interactive TUI and CLI powered by Claude and OpenRouter"
keywords     = ["ai", "agent", "llm", "tui", "cli"]
categories   = ["command-line-utilities"]

[[bin]]
name = "garudust"
path = "src/main.rs"

[dependencies]
garudust-core      = { path = "../../crates/garudust-core",      version = "0.2.1" }
garudust-agent     = { path = "../../crates/garudust-agent",     version = "0.2.1" }
garudust-memory    = { path = "../../crates/garudust-memory",    version = "0.2.1" }
garudust-transport = { path = "../../crates/garudust-transport", version = "0.2.1" }
garudust-tools     = { path = "../../crates/garudust-tools",     version = "0.2.1" }
clap               = { workspace = true }
ratatui            = { workspace = true }
crossterm          = { workspace = true }
tokio              = { workspace = true }
tracing            = { workspace = true }
tracing-subscriber = { workspace = true }
anyhow             = { workspace = true }
dotenvy            = { workspace = true }
serde_yaml         = { workspace = true }
reqwest            = { workspace = true }
